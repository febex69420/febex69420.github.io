<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#e3e6ea" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0b0b0d" media="(prefers-color-scheme: dark)" />
  <title>Glaze · Video</title>
  <link rel="stylesheet" href="assets/glaze.css" />
  <style>
    body { overflow: hidden; }
    .editor { height: 100dvh; }
    .workspace { position: relative; flex: 1; display: flex; flex-direction: column; min-height: 0; }
    #stage { position: relative; flex: 1; display: grid; place-items: center; padding: 12px; min-height: 0; overflow: hidden; }
    #video { max-width: 100%; max-height: 100%; border-radius: 6px; box-shadow: var(--shadow-2); background: #000; display: none; transform-origin: center; }

    #drop { text-align: center; padding: 40px; border-radius: var(--r-xl); border: 1.5px dashed var(--hairline); max-width: 480px; }
    #drop .ic { width: 64px; height: 64px; border-radius: var(--r-lg); display: grid; place-items: center; background: var(--fill-soft); margin: 0 auto 18px; }
    #drop .ic svg { width: 32px; height: 32px; }
    #drop h2 { font-size: var(--fs-22); margin-bottom: 8px; }
    #drop p { color: var(--ink-3); margin-bottom: 18px; }
    .drag-over #drop { border-color: var(--ink); background: var(--fill-soft); }

    /* Transport */
    #transport { padding: 10px 14px calc(10px + env(safe-area-inset-bottom)); display: flex; align-items: center; gap: 12px; border-top: 1px solid var(--hairline); }
    #transport .time { font-variant-numeric: tabular-nums; font-size: var(--fs-13); color: var(--ink-2); min-width: 96px; }
    #track { position: relative; flex: 1; height: 40px; cursor: pointer; }
    #track .rail { position: absolute; left: 0; right: 0; top: 50%; transform: translateY(-50%); height: 8px; border-radius: 4px; background: var(--fill-soft-2); }
    #track .sel { position: absolute; top: 50%; transform: translateY(-50%); height: 8px; border-radius: 4px; background: var(--ink); opacity: 0.85; }
    #track .playhead { position: absolute; top: 6px; bottom: 6px; width: 2px; background: var(--ink); border-radius: 2px; pointer-events: none; }
    #track .handle { position: absolute; top: 50%; transform: translate(-50%, -50%); width: 14px; height: 26px; border-radius: 6px; background: var(--glass-strong); border: 1px solid var(--glass-border); box-shadow: var(--shadow-1); cursor: ew-resize; }
    #transport select.speed { width: auto; min-width: 72px; }

    #rail { position: absolute; z-index: var(--z-toolbar); display: none; }
    #panel { position: absolute; z-index: var(--z-toolbar); }
    #panel .panel { gap: var(--sp-4); }
    .sect { display: flex; flex-direction: column; gap: var(--sp-3); }

    @media (min-width: 900px) {
      #panel { right: 14px; top: 14px; width: 282px; max-height: calc(100% - 28px); overflow-y: auto; }
      #panelToggle { display: none; }
    }
    @media (max-width: 899px) {
      #panel { left: 8px; right: 8px; bottom: 0; max-height: 62dvh; overflow-y: auto; border-radius: var(--r-xl) var(--r-xl) 0 0; transform: translateY(105%); transition: transform var(--dur) var(--ease-out); padding-bottom: calc(16px + env(safe-area-inset-bottom)); z-index: var(--z-sheet); }
      #panel.open { transform: none; }
      .sheet-handle { display: block; width: 38px; height: 5px; border-radius: 3px; background: var(--fill-soft-2); margin: 0 auto 10px; }
    }
    .sheet-handle { display: none; }
  </style>
</head>
<body data-no-privacy-note>
  <div class="editor">
    <header class="appbar">
      <a class="brand" href="index.html" aria-label="Glaze home"><span class="mark" aria-hidden="true">◇</span></a>
      <span class="doc-name" id="docName">Video Editor</span>
      <span class="spacer"></span>
      <button class="btn btn-sm" id="openBtn">Open</button>
      <button class="btn btn-sm btn-primary" id="exportBtn" disabled>Export</button>
      <button class="icon-btn" id="panelToggle" aria-label="Settings"></button>
      <button class="icon-btn" data-theme-toggle aria-label="Toggle appearance"></button>
    </header>

    <div class="workspace">
      <div id="stage">
        <div id="drop">
          <span class="ic" data-icon="video"></span>
          <h2>Drop a video to edit</h2>
          <p>Trim, recolour, transform and re-export — all on your device. Nothing is uploaded.</p>
          <button class="btn btn-primary" id="chooseBtn">Choose video</button>
        </div>
        <video id="video" playsinline></video>
      </div>

      <div id="transport" class="glass hidden">
        <button class="icon-btn" id="playBtn" aria-label="Play"></button>
        <span class="time"><span id="curTime">0:00</span> · <span id="selDur" class="muted">0:00</span></span>
        <div id="track">
          <div class="rail"></div>
          <div class="sel" id="sel"></div>
          <div class="playhead" id="playhead"></div>
          <div class="handle" id="hIn" aria-label="Trim start"></div>
          <div class="handle" id="hOut" aria-label="Trim end"></div>
        </div>
        <select class="speed" id="speed" aria-label="Playback speed">
          <option value="0.25">0.25×</option><option value="0.5">0.5×</option>
          <option value="1" selected>1×</option><option value="1.5">1.5×</option>
          <option value="2">2×</option><option value="4">4×</option>
        </select>
        <button class="icon-btn" id="muteBtn" aria-label="Mute"></button>
      </div>

      <aside id="panel" class="glass-strong glass" aria-label="Settings">
        <div class="sheet-handle" id="sheetHandle"></div>
        <div class="panel">
          <div class="sect">
            <h4>Light &amp; Colour</h4>
            <div id="adjustControls"></div>
            <button class="reset-link" id="resetAdjust" style="background:none;border:0;color:var(--ink-3);text-decoration:underline;cursor:pointer;align-self:flex-start;font-size:13px">Reset</button>
          </div>
          <hr class="divider" />
          <div class="sect">
            <h4>Transform</h4>
            <div class="row wrap">
              <button class="btn btn-sm" id="rotR" title="Rotate"></button>
              <button class="btn btn-sm" id="flipH" title="Flip horizontal"></button>
              <button class="btn btn-sm" id="flipV" title="Flip vertical"></button>
            </div>
          </div>
          <hr class="divider" />
          <div class="sect">
            <h4>Audio</h4>
            <label class="field-row"><span class="field-label grow">Mute audio</span>
              <span class="switch"><input type="checkbox" id="muteChk"><span class="track"></span></span>
            </label>
          </div>
        </div>
      </aside>
    </div>
  </div>

  <script src="assets/common.js"></script>
  <script src="assets/video.js"></script>
</body>
</html>
