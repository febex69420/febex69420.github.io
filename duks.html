<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Duks</title>
<style>
    :root {
        --text: #ffffff;
        --text-dim: rgba(255, 255, 255, 0.68);
        --tile: rgba(255, 255, 255, 0.14);
        --tile-strong: rgba(255, 255, 255, 0.20);
        --tile-soft: rgba(255, 255, 255, 0.10);
        --tile-border: rgba(255, 255, 255, 0.30);
        --ios-blue: linear-gradient(180deg, #4aa3ff, #0a78f0);
        --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
        --ease: cubic-bezier(0.22, 1, 0.36, 1);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }

    body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        color: var(--text);
        background: #2c4f7a;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        padding: 32px 16px 64px;
        overflow-x: hidden;
        position: relative;
        -webkit-font-smoothing: antialiased;
    }

    /* ---------- iOS-style blue wallpaper ---------- */
    .bg {
        position: fixed;
        inset: 0;
        z-index: -2;
        overflow: hidden;
        background:
            radial-gradient(120% 80% at 50% -10%, #80acd8 0%, rgba(128,172,216,0) 55%),
            radial-gradient(80% 60% at 82% 58%, rgba(234,176,128,0.28) 0%, rgba(234,176,128,0) 55%),
            linear-gradient(180deg, #5d8dc2 0%, #436fa6 38%, #2f5279 72%, #203b5a 100%);
    }
    .blob {
        position: absolute;
        border-radius: 50%;
        filter: blur(90px);
        animation: drift 32s ease-in-out infinite;
    }
    .blob.b1 { width: 60vmax; height: 60vmax; background: rgba(150, 192, 236, 0.45); top: -22%; left: -16%; animation-delay: 0s; }
    .blob.b2 { width: 50vmax; height: 50vmax; background: rgba(236, 182, 132, 0.22); top: 38%; right: -20%; animation-delay: -10s; }
    .blob.b3 { width: 55vmax; height: 55vmax; background: rgba(70, 120, 180, 0.40); bottom: -24%; left: -10%; animation-delay: -5s; }

    @keyframes drift {
        0%   { transform: translate(0, 0) scale(1); }
        50%  { transform: translate(6vw, 5vh) scale(1.08); }
        100% { transform: translate(0, 0) scale(1); }
    }

    /* ---------- frosted glass tile ---------- */
    .glass {
        position: relative;
        background: var(--tile);
        backdrop-filter: blur(30px) saturate(180%);
        -webkit-backdrop-filter: blur(30px) saturate(180%);
        border: 0.5px solid var(--tile-border);
        box-shadow:
            0 12px 40px rgba(20, 35, 60, 0.30),
            inset 0 0.5px 0 rgba(255, 255, 255, 0.5),
            inset 0 -1px 0 rgba(255, 255, 255, 0.06);
        border-radius: 34px;
    }
    .glass::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        background: linear-gradient(155deg, rgba(255,255,255,0.22), rgba(255,255,255,0) 40%);
        pointer-events: none;
    }

    .card {
        position: relative;
        width: 100%;
        max-width: 500px;
        padding: 24px 22px 28px;
        animation: rise 0.7s var(--ease) both;
    }
    .card > * { position: relative; z-index: 1; }
    @keyframes rise {
        from { opacity: 0; transform: translateY(22px) scale(0.98); }
        to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    header { text-align: center; margin-bottom: 20px; }
    h1 {
        margin: 0;
        font-size: 36px;
        font-weight: 800;
        letter-spacing: -0.5px;
        color: #fff;
        text-shadow: 0 1px 10px rgba(20, 35, 60, 0.25);
    }
    .tagline { margin: 6px 0 0; font-size: 14px; color: var(--text-dim); }

    /* ---------- segmented tab control ---------- */
    .segment {
        position: relative;
        display: flex;
        padding: 4px;
        margin: 0 auto 22px;
        max-width: 320px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.12);
        border: 0.5px solid rgba(255, 255, 255, 0.18);
        box-shadow: inset 0 1px 2px rgba(20, 35, 60, 0.18);
    }
    .segment button {
        flex: 1;
        position: relative;
        z-index: 1;
        border: none;
        background: transparent;
        color: var(--text-dim);
        font-size: 15px;
        font-weight: 600;
        padding: 10px 0;
        cursor: pointer;
        transition: color 0.3s var(--ease);
    }
    .segment button.active { color: #fff; }
    .pill {
        position: absolute;
        top: 4px;
        left: 4px;
        height: calc(100% - 8px);
        width: calc(50% - 4px);
        border-radius: 13px;
        background: rgba(255, 255, 255, 0.28);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        box-shadow: 0 2px 8px rgba(20, 35, 60, 0.25), inset 0 0.5px 0 rgba(255,255,255,0.6);
        transition: transform 0.45s var(--spring);
    }
    .pill.right { transform: translateX(100%); }

    .panel { display: none; animation: fade 0.45s var(--ease) both; }
    .panel.active { display: block; }
    @keyframes fade {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    /* ---------- pick panel ---------- */
    .result {
        position: relative;
        text-align: center;
        font-size: clamp(30px, 8vw, 44px);
        font-weight: 800;
        letter-spacing: -0.5px;
        min-height: 108px;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 18px;
        margin-bottom: 18px;
        border-radius: 26px;
        background: var(--tile-soft);
        backdrop-filter: blur(20px) saturate(160%);
        -webkit-backdrop-filter: blur(20px) saturate(160%);
        border: 0.5px solid rgba(255, 255, 255, 0.22);
        box-shadow: inset 0 0.5px 0 rgba(255,255,255,0.45), inset 0 -8px 18px rgba(20,35,60,0.10);
        overflow: hidden;
        word-break: break-word;
        text-shadow: 0 1px 8px rgba(20, 35, 60, 0.25);
    }
    .result.placeholder { color: var(--text-dim); font-weight: 600; font-size: 19px; text-shadow: none; }
    .result.spinning { color: var(--text-dim); }
    .result.reveal { animation: pop 0.5s var(--spring); }
    @keyframes pop {
        0%   { transform: scale(0.6); opacity: 0; }
        60%  { transform: scale(1.12); }
        100% { transform: scale(1); opacity: 1; }
    }

    .duks-btn {
        position: relative;
        display: block;
        width: 100%;
        padding: 19px;
        font-size: 23px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: #fff;
        cursor: pointer;
        border: 0.5px solid rgba(255, 255, 255, 0.5);
        border-radius: 24px;
        background: var(--ios-blue);
        box-shadow: 0 8px 24px rgba(10, 120, 240, 0.45), inset 0 1px 1px rgba(255,255,255,0.5);
        overflow: hidden;
        transition: transform 0.18s var(--spring), box-shadow 0.25s var(--ease), filter 0.2s;
    }
    .duks-btn:hover { filter: brightness(1.06); box-shadow: 0 12px 30px rgba(10, 120, 240, 0.55), inset 0 1px 1px rgba(255,255,255,0.5); }
    .duks-btn:active { transform: scale(0.96); }
    .duks-btn:disabled { opacity: 0.65; cursor: not-allowed; }
    .duks-btn::after {
        content: "";
        position: absolute;
        top: 0; left: -60%;
        width: 40%; height: 100%;
        background: linear-gradient(110deg, transparent, rgba(255,255,255,0.45), transparent);
        transform: skewX(-20deg);
        animation: sweep 3.8s ease-in-out infinite;
    }
    @keyframes sweep {
        0%, 60% { left: -60%; }
        100% { left: 140%; }
    }

    /* ---------- groups panel ---------- */
    .group-controls { display: flex; gap: 10px; align-items: stretch; margin-bottom: 8px; }
    .group-controls .field { flex: 1; display: flex; flex-direction: column; gap: 4px; }
    .group-controls label { font-size: 12px; color: var(--text-dim); padding-left: 4px; }
    .stepper {
        display: flex;
        align-items: center;
        border-radius: 16px;
        background: var(--tile-soft);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 0.5px solid rgba(255, 255, 255, 0.22);
        box-shadow: inset 0 0.5px 0 rgba(255,255,255,0.4);
        overflow: hidden;
    }
    .stepper button {
        width: 44px;
        border: none;
        background: transparent;
        color: #fff;
        font-size: 22px;
        cursor: pointer;
        transition: background 0.2s;
    }
    .stepper button:hover { background: rgba(255, 255, 255, 0.16); }
    .stepper input {
        flex: 1;
        width: 100%;
        text-align: center;
        border: none;
        background: transparent;
        color: #fff;
        font-size: 20px;
        font-weight: 700;
        padding: 12px 0;
        -moz-appearance: textfield;
    }
    .stepper input::-webkit-outer-spin-button,
    .stepper input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

    .make-btn {
        align-self: flex-end;
        padding: 0 22px;
        height: 50px;
        font-size: 16px;
        font-weight: 700;
        color: #fff;
        border: 0.5px solid rgba(255, 255, 255, 0.5);
        border-radius: 16px;
        background: var(--ios-blue);
        box-shadow: 0 6px 18px rgba(10, 120, 240, 0.4), inset 0 1px 1px rgba(255,255,255,0.45);
        cursor: pointer;
        transition: transform 0.18s var(--spring), filter 0.2s;
        white-space: nowrap;
    }
    .make-btn:hover { filter: brightness(1.06); }
    .make-btn:active { transform: scale(0.95); }

    .hint { font-size: 12px; color: var(--text-dim); margin: 0 0 18px; padding-left: 4px; min-height: 16px; }

    .groups { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
    .group-card {
        padding: 14px 16px 16px;
        border-radius: 22px;
        background: var(--tile-strong);
        backdrop-filter: blur(24px) saturate(170%);
        -webkit-backdrop-filter: blur(24px) saturate(170%);
        border: 0.5px solid rgba(255, 255, 255, 0.28);
        box-shadow: inset 0 0.5px 0 rgba(255,255,255,0.5), 0 6px 16px rgba(20,35,60,0.18);
        animation: cardIn 0.5s var(--spring) both;
    }
    @keyframes cardIn {
        from { opacity: 0; transform: translateY(14px) scale(0.96); }
        to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .group-card h3 {
        margin: 0 0 8px;
        font-size: 13px;
        color: var(--text-dim);
        text-transform: uppercase;
        letter-spacing: 1px;
    }
    .group-card ul { list-style: none; margin: 0; padding: 0; }
    .group-card li {
        font-size: 16px;
        font-weight: 600;
        padding: 4px 0;
        border-bottom: 0.5px solid rgba(255, 255, 255, 0.14);
    }
    .group-card li:last-child { border-bottom: none; }

    /* ---------- shared name manager ---------- */
    .names-section { margin-top: 26px; }
    .section-head {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: 12px;
    }
    .section-head h2 { margin: 0; font-size: 16px; font-weight: 700; }
    .count {
        font-size: 12px;
        color: var(--text-dim);
        background: rgba(255, 255, 255, 0.16);
        border: 0.5px solid rgba(255,255,255,0.22);
        padding: 3px 10px;
        border-radius: 999px;
    }

    .add-row { display: flex; gap: 10px; margin-bottom: 16px; }
    .add-row input {
        flex: 1;
        padding: 13px 16px;
        font-size: 15px;
        color: #fff;
        border-radius: 16px;
        background: var(--tile-soft);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 0.5px solid rgba(255, 255, 255, 0.22);
        box-shadow: inset 0 0.5px 0 rgba(255,255,255,0.35);
        transition: border 0.25s, background 0.25s;
    }
    .add-row input::placeholder { color: var(--text-dim); }
    .add-row input:focus {
        outline: none;
        border-color: rgba(255, 255, 255, 0.6);
        background: rgba(255, 255, 255, 0.16);
    }
    .add-row .add-btn {
        width: 50px;
        border: 0.5px solid rgba(255, 255, 255, 0.5);
        border-radius: 16px;
        background: var(--ios-blue);
        color: #fff;
        font-size: 26px;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 4px 12px rgba(10,120,240,0.4), inset 0 1px 1px rgba(255,255,255,0.45);
        transition: transform 0.18s var(--spring), filter 0.2s;
    }
    .add-row .add-btn:hover { filter: brightness(1.06); }
    .add-row .add-btn:active { transform: scale(0.9); }

    .chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 8px 8px 14px;
        font-size: 15px;
        font-weight: 600;
        border-radius: 999px;
        background: var(--tile-strong);
        backdrop-filter: blur(20px) saturate(170%);
        -webkit-backdrop-filter: blur(20px) saturate(170%);
        border: 0.5px solid rgba(255, 255, 255, 0.28);
        box-shadow: inset 0 0.5px 0 rgba(255,255,255,0.5), 0 2px 8px rgba(20,35,60,0.14);
        animation: chipIn 0.35s var(--spring) both;
        transition: transform 0.2s var(--ease);
    }
    .chip:hover { transform: translateY(-2px); }
    .chip.removing { animation: chipOut 0.28s var(--ease) forwards; }
    @keyframes chipIn {
        from { opacity: 0; transform: scale(0.7); }
        to   { opacity: 1; transform: scale(1); }
    }
    @keyframes chipOut { to { opacity: 0; transform: scale(0.6); } }
    .chip .x {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 22px; height: 22px;
        border: none;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.2);
        color: #fff;
        font-size: 15px;
        line-height: 1;
        cursor: pointer;
        transition: background 0.2s, transform 0.2s;
    }
    .chip .x:hover { background: #ff4d6a; transform: rotate(90deg); }

    .empty-note { color: var(--text-dim); font-size: 14px; padding: 6px 2px; }

    @media (prefers-reduced-motion: reduce) {
        * { animation-duration: 0.001s !important; transition-duration: 0.05s !important; }
        .blob { animation: none; }
        .duks-btn::after { display: none; }
    }
</style>
</head>
<body>
    <div class="bg">
        <div class="blob b1"></div>
        <div class="blob b2"></div>
        <div class="blob b3"></div>
    </div>

    <main class="card glass">
        <header>
            <h1>🎲 Duks</h1>
            <p class="tagline">Vælg en tilfældig duks — eller lav grupper</p>
        </header>

        <nav class="segment" role="tablist" aria-label="Tilstand">
            <span class="pill" id="pill"></span>
            <button class="active" id="tabPick" role="tab" aria-selected="true" onclick="switchTab('pick')">Vælg duks</button>
            <button id="tabGroups" role="tab" aria-selected="false" onclick="switchTab('groups')">Grupper</button>
        </nav>

        <!-- PICK PANEL -->
        <section class="panel active" id="panelPick" role="tabpanel" aria-label="Vælg duks">
            <div class="result placeholder" id="result" aria-live="polite">Tryk på knappen</div>
            <button class="duks-btn" id="duksBtn" onclick="pickDuks()">duks</button>
        </section>

        <!-- GROUPS PANEL -->
        <section class="panel" id="panelGroups" role="tabpanel" aria-label="Grupper" hidden>
            <div class="group-controls">
                <div class="field">
                    <label for="perGroup">Personer per gruppe</label>
                    <div class="stepper">
                        <button type="button" aria-label="Færre" onclick="stepSize(-1)">−</button>
                        <input type="number" id="perGroup" value="2" min="1" inputmode="numeric">
                        <button type="button" aria-label="Flere" onclick="stepSize(1)">+</button>
                    </div>
                </div>
                <button class="make-btn" onclick="makeGroups()">Lav grupper</button>
            </div>
            <p class="hint" id="groupHint"></p>
            <div class="groups" id="groups"></div>
        </section>

        <!-- SHARED NAME MANAGER -->
        <section class="names-section">
            <div class="section-head">
                <h2>Navne</h2>
                <span class="count" id="count">0</span>
            </div>
            <div class="add-row">
                <input type="text" id="newName" placeholder="Tilføj et navn…" autocomplete="off"
                       onkeydown="if(event.key==='Enter') addName()">
                <button class="add-btn" aria-label="Tilføj navn" onclick="addName()">+</button>
            </div>
            <div class="chips" id="chips"></div>
        </section>
    </main>

<script>
    // Default roster — recreated fresh on every load (nothing is saved).
    const DEFAULT_NAMES = [
        "felix", "felix h", "marius", "mads", "nord enisa", "emma",
        "liah", "keyla", "parsa", "irusa", "mie", "berat", "asit",
        "elias", "tristan", "lias", "emil N", "emil"
    ];

    // Names that quietly never win the single pick. Kept invisible in the UI.
    const BLOCKED = ["felix"];

    let names = DEFAULT_NAMES.slice();
    let spinning = false;

    const $ = (id) => document.getElementById(id);

    function isBlocked(name) {
        return BLOCKED.includes(name.trim().toLowerCase());
    }

    function shuffle(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    /* ---------------- name manager (in-memory only) ---------------- */
    function renderNames() {
        const chips = $("chips");
        $("count").textContent = names.length;
        chips.innerHTML = "";
        if (names.length === 0) {
            const note = document.createElement("span");
            note.className = "empty-note";
            note.textContent = "Ingen navne endnu — tilføj et ovenfor.";
            chips.appendChild(note);
            return;
        }
        names.forEach((name, index) => {
            const chip = document.createElement("span");
            chip.className = "chip";

            const label = document.createElement("span");
            label.textContent = name;

            const x = document.createElement("button");
            x.className = "x";
            x.textContent = "×";
            x.setAttribute("aria-label", "Fjern " + name);
            x.onclick = () => removeName(index, chip);

            chip.appendChild(label);
            chip.appendChild(x);
            chips.appendChild(chip);
        });
    }

    function addName() {
        const input = $("newName");
        const value = input.value.trim();
        if (value === "") return;
        names.push(value);
        renderNames();
        input.value = "";
        input.focus();
    }

    function removeName(index, chipEl) {
        if (chipEl) {
            chipEl.classList.add("removing");
            setTimeout(() => { names.splice(index, 1); renderNames(); }, 240);
        } else {
            names.splice(index, 1);
            renderNames();
        }
    }

    /* ---------------- tabs ---------------- */
    function switchTab(which) {
        const pick = which === "pick";
        $("pill").classList.toggle("right", !pick);
        $("tabPick").classList.toggle("active", pick);
        $("tabGroups").classList.toggle("active", !pick);
        $("tabPick").setAttribute("aria-selected", pick);
        $("tabGroups").setAttribute("aria-selected", !pick);
        $("panelPick").classList.toggle("active", pick);
        $("panelGroups").classList.toggle("active", !pick);
        $("panelPick").hidden = !pick;
        $("panelGroups").hidden = pick;
    }

    /* ---------------- pick a duks ---------------- */
    function pickDuks() {
        if (spinning) return;
        const eligible = names.filter(n => !isBlocked(n));
        const result = $("result");

        if (eligible.length === 0) {
            result.className = "result placeholder";
            result.textContent = "Ingen at vælge 🤷";
            return;
        }

        spinning = true;
        $("duksBtn").disabled = true;
        result.className = "result spinning";

        const finalChoice = eligible[Math.floor(Math.random() * eligible.length)];
        const start = performance.now();
        const duration = 1100;

        function frame(now) {
            const elapsed = now - start;
            result.textContent = eligible[Math.floor(Math.random() * eligible.length)];
            if (elapsed < duration) {
                const delay = 40 + (elapsed / duration) * 120; // 40ms → 160ms
                setTimeout(() => requestAnimationFrame(frame), delay);
            } else {
                result.textContent = finalChoice;
                result.className = "result reveal";
                spinning = false;
                $("duksBtn").disabled = false;
            }
        }
        requestAnimationFrame(frame);
    }

    /* ---------------- groups ---------------- */
    function stepSize(delta) {
        const input = $("perGroup");
        let v = parseInt(input.value, 10) || 1;
        v = Math.max(1, v + delta);
        input.value = v;
    }

    function makeGroups() {
        const size = Math.max(1, parseInt($("perGroup").value, 10) || 1);
        const hint = $("groupHint");
        const container = $("groups");
        container.innerHTML = "";

        const pool = names.slice(); // everyone is included in groups
        if (pool.length === 0) {
            hint.textContent = "Tilføj nogle navne først.";
            return;
        }
        shuffle(pool);

        const total = pool.length;
        const groupCount = Math.ceil(total / size);
        const base = Math.floor(total / groupCount);
        let remainder = total % groupCount;

        const groups = [];
        let idx = 0;
        for (let g = 0; g < groupCount; g++) {
            const take = base + (remainder > 0 ? 1 : 0);
            if (remainder > 0) remainder--;
            groups.push(pool.slice(idx, idx + take));
            idx += take;
        }

        hint.textContent = `${total} personer fordelt i ${groupCount} ${groupCount === 1 ? "gruppe" : "grupper"}.`;

        groups.forEach((members, i) => {
            const card = document.createElement("div");
            card.className = "group-card";
            card.style.animationDelay = (i * 0.07) + "s";

            const h = document.createElement("h3");
            h.textContent = "Gruppe " + (i + 1);
            const ul = document.createElement("ul");
            members.forEach(m => {
                const li = document.createElement("li");
                li.textContent = m;
                ul.appendChild(li);
            });
            card.appendChild(h);
            card.appendChild(ul);
            container.appendChild(card);
        });
    }

    renderNames();
</script>
</body>
</html>
